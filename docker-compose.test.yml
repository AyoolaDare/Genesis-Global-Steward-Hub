services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cms_test
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d cms_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      DJANGO_SETTINGS_MODULE: cms.settings.development
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "False"
      DB_NAME: cms_test
      DB_USER: testuser
      DB_PASSWORD: testpass
      DB_HOST: db
      DB_PORT: "5432"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend-test"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
    command: >
      sh -c "
      python manage.py migrate &&
      pytest -v --tb=short;
      code=$$?;
      if [ $$code -eq 5 ]; then
        echo 'No tests collected; treating as success.';
        exit 0;
      fi;
      exit $$code
      "
