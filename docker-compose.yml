services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       cms_church_dev
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5433:5432"   # host:5433 avoids clash with any native PostgreSQL on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app        # live reload — changes reflect instantly
    ports:
      - "0.0.0.0:8001:8000"
    environment:
      DJANGO_SETTINGS_MODULE: cms.settings.development
      SECRET_KEY:   dev-secret-key-for-docker-NOT-for-production-change-me
      DEBUG:        "True"
      DB_NAME:      cms_church_dev
      DB_USER:      postgres
      DB_PASSWORD:  postgres
      DB_HOST:      db
      DB_PORT:      "5432"
      ALLOWED_HOSTS: "*"
      CORS_ALLOW_ALL_ORIGINS: "True"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/src        # live reload
      - ./frontend/public:/app/public
    ports:
      - "0.0.0.0:5173:5173"
    environment:
      VITE_API_URL: /api/v1
      VITE_API_PROXY_TARGET: http://backend:8000
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      - backend

volumes:
  postgres_data:
