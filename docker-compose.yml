services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       cms_church_dev
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5433:5432"   # host:5433 avoids clash with any native PostgreSQL on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app        # live reload — changes reflect instantly
    ports:
      - "127.0.0.1:8000:8000"   # bind to localhost only
    environment:
      DJANGO_SETTINGS_MODULE: cms.settings.development
      SECRET_KEY:   dev-secret-key-for-docker-NOT-for-production-change-me
      DEBUG:        "True"
      DB_NAME:      cms_church_dev
      DB_USER:      postgres
      DB_PASSWORD:  postgres
      DB_HOST:      db          # Docker service name, not localhost
      DB_PORT:      "5432"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/src        # live reload
      - ./frontend/public:/app/public
    ports:
      - "127.0.0.1:5173:5173"   # bind to localhost only
    environment:
      # When using the Vite proxy, VITE_API_URL isn't used at runtime in dev.
      # Set it anyway so any code that imports it doesn't break.
      VITE_API_URL: http://localhost:8000/api/v1
      # Tells vite.config.ts which host to proxy /api requests to
      VITE_API_PROXY_TARGET: http://backend:8000
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      - backend

volumes:
  postgres_data:
