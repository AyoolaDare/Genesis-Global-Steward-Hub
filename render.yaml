# Render Infrastructure-as-Code
# Docs: https://render.com/docs/blueprint-spec
#
# How to use:
#   1. Push this file to your GitHub repo
#   2. In Render dashboard → "New Blueprint" → connect your repo
#   3. Render will provision the database + web service automatically
#   4. Fill in the "sync: false" env vars in the Render dashboard after creation:
#      - SECRET_KEY, CORS_ALLOWED_ORIGINS, CSRF_TRUSTED_ORIGINS
#      - CLOUDINARY_*, EMAIL_FROM

services:
  - type: web
    name: cms-backend
    env: python
    region: oregon
    plan: free          # upgrade to "starter" for always-on
    rootDir: backend
    runtime: python
    buildCommand: |
      pip install -r requirements/production.txt &&
      python manage.py collectstatic --noinput --settings=cms.settings.production
    startCommand: >
      python manage.py migrate --settings=cms.settings.production &&
      python manage.py ensure_superuser --settings=cms.settings.production &&
      gunicorn cms.wsgi:application
      --bind 0.0.0.0:$PORT
      --workers 2
      --timeout 120
      --access-logfile -
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: cms.settings.production

      - key: PYTHON_VERSION
        value: 3.12.0

      # Auto-generated strong secret — do NOT override manually
      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"

      # Render injects the hostname automatically; add your custom domain too.
      # Example: cms-backend.onrender.com,api.yourchurch.org
      - key: ALLOWED_HOSTS
        sync: false

      # Database connection — auto-populated from the database below
      - key: DB_NAME
        fromDatabase:
          name: cms-db
          property: database

      - key: DB_USER
        fromDatabase:
          name: cms-db
          property: user

      - key: DB_PASSWORD
        fromDatabase:
          name: cms-db
          property: password

      - key: DB_HOST
        fromDatabase:
          name: cms-db
          property: host

      - key: DB_PORT
        fromDatabase:
          name: cms-db
          property: port

      # Set these in the Render dashboard after first deploy
      # Example: https://cms-church.vercel.app,https://yourchurch.org
      - key: CORS_ALLOWED_ORIGINS
        sync: false

      # Example: https://cms-backend.onrender.com,https://api.yourchurch.org
      - key: CSRF_TRUSTED_ORIGINS
        sync: false

      # Cloudinary credentials (from cloudinary.com dashboard)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false

      - key: CLOUDINARY_API_KEY
        sync: false

      - key: CLOUDINARY_API_SECRET
        sync: false

      - key: EMAIL_FROM
        value: noreply@yourchurch.org

      # Optional one-time bootstrap admin (set in dashboard; do not commit real values)
      - key: SUPERUSER_EMAIL
        sync: false

      - key: SUPERUSER_USERNAME
        sync: false

      - key: SUPERUSER_PASSWORD
        sync: false

  # ── Cron: weekly prayer SMS (every Sunday 08:00 WAT = 07:00 UTC) ───────────
  - type: cron
    name: cms-weekly-prayers
    env: python
    region: oregon
    plan: starter
    rootDir: backend
    runtime: python
    schedule: "0 7 * * 0"
    buildCommand: pip install -r requirements/production.txt
    startCommand: python manage.py send_weekly_prayers --settings=cms.settings.production
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: cms.settings.production
      - key: DB_NAME
        fromDatabase:
          name: cms-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: cms-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cms-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: cms-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: cms-db
          property: port
      - key: TERMII_API_KEY
        sync: false
      - key: TERMII_SENDER_ID
        sync: false

  # ── Cron: monthly greeting SMS (1st of month 09:00 WAT = 08:00 UTC) ─────
  - type: cron
    name: cms-monthly-greetings
    env: python
    region: oregon
    plan: starter
    rootDir: backend
    runtime: python
    schedule: "0 8 1 * *"
    buildCommand: pip install -r requirements/production.txt
    startCommand: python manage.py send_monthly_greetings --settings=cms.settings.production
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: cms.settings.production
      - key: DB_NAME
        fromDatabase:
          name: cms-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: cms-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cms-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: cms-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: cms-db
          property: port
      - key: TERMII_API_KEY
        sync: false
      - key: TERMII_SENDER_ID
        sync: false

databases:
  - name: cms-db
    databaseName: cms_church
    user: cms_user
    region: oregon
    plan: free          # upgrade to "starter" for daily backups
