name: Deploy Backend → Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements/production.txt

      - name: Install production dependencies
        working-directory: backend
        run: pip install -r requirements/production.txt

      - name: Validate Azure secrets
        shell: bash
        run: |
          missing=0
          [ -z "${{ secrets.AZURE_WEBAPP_NAME }}" ]             && echo "Missing: AZURE_WEBAPP_NAME"             && missing=1
          [ -z "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ]  && echo "Missing: AZURE_WEBAPP_PUBLISH_PROFILE"  && missing=1
          [ "$missing" -eq 1 ] && echo "Add missing secrets in GitHub: Settings > Secrets > Actions" && exit 1
          echo "All secrets present ✅"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./backend

      - name: Wait for app to warm up
        run: sleep 30

      - name: Health check
        run: |
          URL="https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/v1/health/"
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "Healthy ✅" && exit 0
            sleep 20
          done
          echo "Health check timed out ❌"
          exit 1
