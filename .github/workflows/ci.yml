name: CI — Test & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-ci:
    name: Backend Tests & Lint (Django)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER:     testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB:       cms_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements/development.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements/development.txt

      - name: Run Django system checks
        working-directory: backend
        run: python manage.py check
        env:
          DJANGO_SETTINGS_MODULE: cms.settings.development
          SECRET_KEY:   ci-test-secret-key-not-for-production
          DB_NAME:      cms_test
          DB_USER:      testuser
          DB_PASSWORD:  testpass
          DB_HOST:      localhost
          DB_PORT:      5432

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate
        env:
          DJANGO_SETTINGS_MODULE: cms.settings.development
          SECRET_KEY:   ci-test-secret-key-not-for-production
          DB_NAME:      cms_test
          DB_USER:      testuser
          DB_PASSWORD:  testpass
          DB_HOST:      localhost
          DB_PORT:      5432

      - name: Run tests with pytest
        working-directory: backend
        run: pytest --cov=apps --cov-report=xml -v
        env:
          DJANGO_SETTINGS_MODULE: cms.settings.development
          SECRET_KEY:   ci-test-secret-key-not-for-production
          DB_NAME:      cms_test
          DB_USER:      testuser
          DB_PASSWORD:  testpass
          DB_HOST:      localhost
          DB_PORT:      5432

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml

  frontend-ci:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run TypeScript type check
        working-directory: frontend
        run: npm run typecheck

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          # Point at a placeholder during CI — real URL comes from Vercel env vars
          VITE_API_URL: https://cms-backend.onrender.com/api/v1
